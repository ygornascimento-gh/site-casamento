  <path d="M80 95 Q108 80 115 100" stroke="#A8B5A0" stroke-width="3" fill="none" opacity="0.2"/>
  <path d="M108 85 Q125 70 140 90" stroke="#A8B5A0" stroke-width="3" fill="none" opacity="0.2"/>
  <path d="M95 90 Q108 75 120 85" stroke="#A8B5A0" stroke-width="2.5" fill="none" opacity="0.18"/>
  <!-- Water -->
