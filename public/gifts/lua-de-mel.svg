  <circle cx="270" cy="110" r="4" fill="#D4A574" opacity="0.25"/>
  <!-- Stars -->
  <circle cx="300" cy="45" r="2" fill="#D4A574" opacity="0.3"/>
  <circle cx="170" cy="40" r="1.5" fill="#D4A574" opacity="0.25"/>
  <circle cx="330" cy="70" r="1.5" fill="#D4A574" opacity="0.2"/>
  <text x="200" y="210" text-anchor="middle" font-family="serif" font-size="14" fill="#3D3533" opacity="0.6">Lua de Mel</text>
