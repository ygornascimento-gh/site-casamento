  <line x1="228" y1="85" x2="228" y2="165" stroke="#D4A574" stroke-width="0.8" opacity="0.12"/>
  <line x1="145" y1="112" x2="255" y2="112" stroke="#D4A574" stroke-width="0.8" opacity="0.12"/>
  <line x1="145" y1="138" x2="255" y2="138" stroke="#D4A574" stroke-width="0.8" opacity="0.12"/>
  <!-- Game pieces -->
  <circle cx="186" cy="98" r="8" fill="#F2B5C8" opacity="0.4"/>
  <circle cx="214" cy="125" r="8" fill="#A8B5A0" opacity="0.4"/>
  <circle cx="186" cy="152" r="8" fill="#D4A574" opacity="0.35"/>
