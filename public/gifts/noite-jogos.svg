  <rect x="275" y="100" width="28" height="28" rx="5" fill="white" stroke="#D4A574" stroke-width="1.5" stroke-opacity="0.3" transform="rotate(15 289 114)"/>
  <circle cx="283" cy="108" r="2" fill="#3D3533" opacity="0.25"/>
  <circle cx="295" cy="108" r="2" fill="#3D3533" opacity="0.25"/>
  <circle cx="289" cy="114" r="2" fill="#3D3533" opacity="0.25"/>
  <circle cx="283" cy="120" r="2" fill="#3D3533" opacity="0.25"/>
  <circle cx="295" cy="120" r="2" fill="#3D3533" opacity="0.25"/>
  <!-- Cards -->
  <rect x="90" y="105" width="30" height="42" rx="4" fill="#F2B5C8" opacity="0.2" stroke="#F2B5C8" stroke-width="1" stroke-opacity="0.3" transform="rotate(-10 105 126)"/>
  <rect x="100" y="102" width="30" height="42" rx="4" fill="#A8B5A0" opacity="0.15" stroke="#A8B5A0" stroke-width="1" stroke-opacity="0.25" transform="rotate(5 115 123)"/>
