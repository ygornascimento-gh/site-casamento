  <circle cx="210" cy="128" r="9" fill="#3D3533" opacity="0.1"/>
  <rect x="183" y="138" width="14" height="20" rx="4" fill="#3D3533" opacity="0.08"/>
  <rect x="203" y="136" width="14" height="22" rx="4" fill="#3D3533" opacity="0.08"/>
  <!-- Blanket -->
  <ellipse cx="200" cy="165" rx="40" ry="8" fill="#F2B5C8" opacity="0.2"/>
  <!-- Heart -->
  <path d="M195 110c0-4 3-7 6-7s6 3 6 7c0 9-6 14-6 14s-6-5-6-14z" fill="#F2B5C8" opacity="0.4"/>
