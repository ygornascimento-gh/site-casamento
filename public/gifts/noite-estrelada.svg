  <circle cx="248" cy="55" r="15" fill="#FDF8F5"/>
  <!-- Stars -->
  <g fill="#D4A574" opacity="0.4">
    <polygon points="130,50 132,55 137,55 133,58 135,63 130,60 125,63 127,58 123,55 128,55"/>
    <polygon points="170,40 171,43 174,43 172,45 173,48 170,46 167,48 168,45 166,43 169,43" transform="scale(0.8) translate(35 8)"/>
    <polygon points="280,70 282,75 287,75 283,78 285,83 280,80 275,83 277,78 273,75 278,75" transform="scale(0.7) translate(85 25)"/>
  </g>
  <!-- Small stars as dots -->
  <circle cx="160" cy="55" r="1.5" fill="#D4A574" opacity="0.35"/>
  <circle cx="300" cy="50" r="1" fill="#D4A574" opacity="0.3"/>
  <circle cx="120" cy="80" r="1" fill="#D4A574" opacity="0.25"/>
  <circle cx="270" cy="45" r="1.5" fill="#D4A574" opacity="0.3"/>
