  <polygon points="80,170 160,80 240,170" fill="#A8B5A0" opacity="0.2"/>
  <polygon points="180,170 260,90 340,170" fill="#A8B5A0" opacity="0.15"/>
  <!-- Sun -->
  <circle cx="300" cy="60" r="25" fill="#D4A574" opacity="0.25"/>
  <circle cx="300" cy="60" r="18" fill="#D4A574" opacity="0.15"/>
  <!-- Suitcase -->
  <rect x="165" y="130" width="70" height="50" rx="8" fill="#F2B5C8" opacity="0.3" stroke="#F2B5C8" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="185" y="122" width="30" height="12" rx="5" fill="none" stroke="#F2B5C8" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="200" y1="142" x2="200" y2="168" stroke="#F2B5C8" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="178" y1="155" x2="222" y2="155" stroke="#F2B5C8" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Airplane -->
  <path d="M100 50 L115 45 L125 50 L115 55Z" fill="#D4A574" opacity="0.4"/>
  <line x1="115" y1="50" x2="90" y2="55" stroke="#D4A574" stroke-width="1.5" opacity="0.3" stroke-dasharray="3 3"/>
  <!-- Heart -->
  <path d="M192 105c0-5 4-9 8-9s8 4 8 9c0 12-8 18-8 18s-8-6-8-18z" fill="#F2B5C8" opacity="0.5"/>
