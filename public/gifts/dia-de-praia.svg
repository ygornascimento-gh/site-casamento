  <path d="M0 150 Q50 140 100 150 Q150 160 200 150 Q250 140 300 150 Q350 160 400 150 L400 240 L0 240Z" fill="#A8B5A0" opacity="0.1"/>
  <path d="M0 160 Q50 155 100 160 Q150 165 200 160 Q250 155 300 160 Q350 165 400 160 L400 240 L0 240Z" fill="#A8B5A0" opacity="0.08"/>
  <!-- Sun -->
  <circle cx="310" cy="55" r="30" fill="#D4A574" opacity="0.2"/>
  <circle cx="310" cy="55" r="20" fill="#D4A574" opacity="0.15"/>
  <!-- Sun rays -->
  <line x1="310" y1="20" x2="310" y2="30" stroke="#D4A574" stroke-width="1.5" opacity="0.2"/>
  <line x1="340" y1="35" x2="335" y2="42" stroke="#D4A574" stroke-width="1.5" opacity="0.2"/>
  <line x1="345" y1="55" x2="338" y2="55" stroke="#D4A574" stroke-width="1.5" opacity="0.2"/>
  <line x1="280" y1="35" x2="285" y2="42" stroke="#D4A574" stroke-width="1.5" opacity="0.2"/>
  <line x1="275" y1="55" x2="282" y2="55" stroke="#D4A574" stroke-width="1.5" opacity="0.2"/>
  <!-- Beach umbrella -->
  <line x1="180" y1="85" x2="180" y2="155" stroke="#D4A574" stroke-width="2.5" opacity="0.3"/>
  <path d="M140 85 Q160 60 180 85 Q200 60 220 85Z" fill="#F2B5C8" opacity="0.3"/>
  <!-- Flip flops -->
  <ellipse cx="230" cy="145" rx="8" ry="12" fill="#F2B5C8" opacity="0.25" transform="rotate(-15 230 145)"/>
  <ellipse cx="248" cy="143" rx="8" ry="12" fill="#D4A574" opacity="0.25" transform="rotate(10 248 143)"/>
  <!-- Shells -->
  <circle cx="140" cy="155" r="4" fill="#D4A574" opacity="0.2"/>
  <circle cx="300" cy="148" r="3" fill="#D4A574" opacity="0.15"/>
  <!-- Heart -->
  <path d="M195 115c0-4 3-7 6-7s6 3 6 7c0 9-6 14-6 14s-6-5-6-14z" fill="#F2B5C8" opacity="0.45"/>
  <text x="200" y="210" text-anchor="middle" font-family="serif" font-size="14" fill="#3D3533" opacity="0.6">Dia de Praia</text>
</svg>
